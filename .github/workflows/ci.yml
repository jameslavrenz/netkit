name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e "python[train]"

      - name: Fetch CMSIS libraries
        run: make cmsis-init

      - name: Build
        run: make

      - name: Build MCU CM4 with CMSIS-NN (host smoke link)
        run: make NETKIT_HOST_SMOKE=1 NETKIT_TARGET=mcu NETKIT_ARCH=CM4 NETKIT_CMSIS_NN=1 NETKIT_CMSIS_DSP=1 lib

      - name: Build with CMSIS-DSP backend
        run: make NETKIT_CMSIS_DSP=1 test-cpp

      - name: Run C++, C API, and Python tests
        run: make test

      - name: CMake configure and build
        run: |
          cmake -B cmake-build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build cmake-build
          ./cmake-build/netkit test

      - name: Build and run C++ example
        run: |
          make example-cpp
          ./examples/infer_cpp models/test_mlp.nk 1 2

      - name: Build and run C example
        run: |
          make example-c
          ./examples/infer_c models/test_mlp.nk 1 2

      - name: CLI smoke test
        run: |
          ./netkit run models/test_mlp.nk --input 1,2
          ./netkit inspect models/test_mlp.nk
          ./netkit inspect models/mnist_cnn.nk --full || true

      - name: Embedded MCU/MPU smoke (NETKIT_ARCH + CMSIS)
        run: ./tools/run_embedded_smoke.sh

  cm4-cross-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM GCC
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: CM4 compile-only (CMSIS-NN)
        run: ./tools/compile_cm4_cross.sh

      - name: CM4 FVP benchmark firmware (compile-only)
        run: |
          make cmsis-init
          PYTHONPATH=python python3 tools/embed_hand_fvp_data.py
          make -C benchmarks/fvp all-models
