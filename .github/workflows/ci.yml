name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e "python[train]"

      - name: Fetch CMSIS libraries
        run: make cmsis-init

      - name: Build
        run: make

      - name: Build with CMSIS-NN backend
        run: make NETKIT_CMSIS_NN=1 test-cpp

      - name: Build with CMSIS-DSP backend
        run: make NETKIT_CMSIS_DSP=1 test-cpp

      - name: Build with CMSIS-NN and CMSIS-DSP backends
        run: make NETKIT_CMSIS_NN=1 NETKIT_CMSIS_DSP=1 test-cpp

      - name: Run C++, C API, and Python tests
        run: make test

      - name: CMake configure and build
        run: |
          cmake -B cmake-build
          cmake --build cmake-build
          ./cmake-build/netkit test

      - name: Build and run C++ example
        run: |
          make example-cpp
          ./examples/infer_cpp models/test_mlp.nk 1 2

      - name: Build and run C example
        run: |
          make example-c
          ./examples/infer_c models/test_mlp.nk 1 2

      - name: CLI smoke test
        run: |
          ./netkit run models/test_mlp.nk --input 1,2
          ./netkit inspect models/test_mlp.nk
          ./netkit inspect models/mnist_cnn.nk --full || true
