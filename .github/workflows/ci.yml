name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e "python[train]"

      - name: Fetch CMSIS libraries
        run: make cmsis-init

      - name: Build
        run: make

      - name: Build MCU CM4 with CMSIS-NN (host smoke link)
        run: make NETKIT_HOST_SMOKE=1 NETKIT_TARGET=mcu NETKIT_ARCH=CM4 NETKIT_CMSIS_NN=1 NETKIT_CMSIS_DSP=1 lib

      - name: Build and smoke-test CMSIS-DSP backend
        run: chmod +x tools/run_cmsis_dsp_smoke.sh && ./tools/run_cmsis_dsp_smoke.sh

      - name: Run C++, C API, and Python tests
        run: make NETKIT_CMSIS_DSP=0 rebuild test

      - name: CMake configure and build
        run: |
          cmake -B cmake-build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build cmake-build
          ./cmake-build/netkit test

      - name: Build and run C++ example
        run: |
          make example-cpp
          ./examples/infer_cpp models/test_mlp.nk 1 2

      - name: Build and run C example
        run: |
          make example-c
          ./examples/infer_c models/test_mlp.nk 1 2

      - name: CLI smoke test
        run: |
          ./netkit run models/test_mlp.nk --input 1,2
          ./netkit inspect models/test_mlp.nk
          ./netkit inspect models/mnist_cnn.nk --full || true

      - name: Embedded MCU/MPU smoke (NETKIT_ARCH + CMSIS)
        run: ./tools/run_embedded_smoke.sh
