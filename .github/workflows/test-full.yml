name: Test full

on:
  workflow_dispatch:

jobs:
  test-full:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install Python dependencies
        run: pip install -e "python[train]"

      - name: Run full regression
        env:
          GITHUB_ACTIONS: true
        run: make NETKIT_CMSIS_DSP=0 rebuild test-full
