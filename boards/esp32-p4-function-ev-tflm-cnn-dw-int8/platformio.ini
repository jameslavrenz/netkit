; Espressif ESP32-P4-Function-EV — MNIST CNN int8 (TFLM via esp-tflite-micro)
; Companion ESP32-C6 on this kit is WiFi-only — not the inference target.
[platformio]
boards_dir = ../esp32-p4-function-ev/boards

[env:esp32_p4_ev]
platform = espressif32
board = esp32-p4-function-ev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
build_flags = -DESP_NN
monitor_filters = direct

[env:esp32_p4_ev_ref]
extends = env:esp32_p4_ev
board_build.cmake_extra_args = -DNETKIT_TFLM_USE_ESP_NN=OFF
build_flags =
