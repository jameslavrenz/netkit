; Seeed XIAO ESP32C3 — MNIST CNN int8 (netkit + ESP-NN)
[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = espidf
monitor_speed = 115200
upload_speed = 460800
build_flags =
	-DNETKIT_TARGET_MCU_ESP=1
	-DNETKIT_USE_ESP_NN=1
	-DNETKIT_MCU_QUANT_ONLY=1
	-DNETKIT_KERNELS_OPTIMIZED_FOR_SPEED=1
	-DNETKIT_USE_MMAP=0
	-DNETKIT_QUANT_TRACE=0
	-DNETKIT_LOOP_UNROLL=0
	-DNETKIT_IM2COL=0
	-DNETKIT_REFERENCE_QUANT_LOOPS=0
	-DCONFIG_NN_OPTIMIZED=1
monitor_filters = direct
