; Seeed XIAO ESP32S3 — MNIST DS-CNN float32 (netkit reference, lowered AOT)
[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800
upload_flags =
	--before=usb-reset
	--after=hard-reset
build_flags =
	-DNETKIT_TARGET_MCU_ESP=1
	-DNETKIT_USE_ESP_NN=0
	-DNETKIT_MCU_QUANT_ONLY=0
	-DNETKIT_KERNELS_OPTIMIZED_FOR_SPEED=1
	-DNETKIT_USE_MMAP=0
	-DNETKIT_QUANT_TRACE=0
	-DNETKIT_LOOP_UNROLL=0
	-DNETKIT_IM2COL=0
	-DNETKIT_REFERENCE_QUANT_LOOPS=1
	-DCONFIG_NN_OPTIMIZED=0
monitor_filters = direct
