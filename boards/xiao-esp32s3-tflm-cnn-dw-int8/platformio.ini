; Seeed XIAO ESP32S3 — MNIST DS-CNN int8 (TFLM via esp-tflite-micro)
[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
upload_speed = 460800
upload_flags =
	--before=usb-reset
	--after=hard_reset
build_flags = -DESP_NN
monitor_filters = direct

; Peer A/B: TFLM reference kernels (no -DESP_NN). Clean rebuild when switching envs.
[env:xiao_esp32s3_ref]
extends = env:xiao_esp32s3
board_build.cmake_extra_args = -DNETKIT_TFLM_USE_ESP_NN=OFF
build_flags =
