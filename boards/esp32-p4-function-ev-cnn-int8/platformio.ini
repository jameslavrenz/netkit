; Espressif ESP32-P4-Function-EV — MNIST CNN int8 (netkit)
; Companion ESP32-C6 on this kit is WiFi-only — not the inference target.
[platformio]
boards_dir = ../esp32-p4-function-ev/boards

[env:esp32_p4_ev]
platform = espressif32
board = esp32-p4-function-ev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
build_flags =
	-DNETKIT_TARGET_MCU_ESP=1
	-DNETKIT_USE_ESP_NN=1
	-DNETKIT_MCU_QUANT_ONLY=1
	-DNETKIT_KERNELS_OPTIMIZED_FOR_SPEED=1
	-DNETKIT_USE_MMAP=0
	-DNETKIT_QUANT_TRACE=0
	-DNETKIT_LOOP_UNROLL=0
	-DNETKIT_IM2COL=0
	-DNETKIT_REFERENCE_QUANT_LOOPS=0
	-DCONFIG_NN_OPTIMIZED=1
monitor_filters = direct

; Peer A/B: QuantOps reference (ESP-NN off). Clean rebuild when switching envs.
[env:esp32_p4_ev_ref]
extends = env:esp32_p4_ev
board_build.cmake_extra_args = -DNETKIT_XIAO_USE_ESP_NN=0
build_flags =
	-DNETKIT_TARGET_MCU_ESP=1
	-DNETKIT_USE_ESP_NN=0
	-DNETKIT_MCU_QUANT_ONLY=1
	-DNETKIT_KERNELS_OPTIMIZED_FOR_SPEED=1
	-DNETKIT_USE_MMAP=0
	-DNETKIT_QUANT_TRACE=0
	-DNETKIT_LOOP_UNROLL=0
	-DNETKIT_IM2COL=0
	-DNETKIT_REFERENCE_QUANT_LOOPS=1
	-DCONFIG_NN_OPTIMIZED=0
