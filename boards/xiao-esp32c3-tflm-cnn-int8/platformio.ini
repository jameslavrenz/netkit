; Seeed XIAO ESP32C3 — MNIST CNN int8 (TFLM + ESP-NN via esp-tflite-micro)
[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = espidf
monitor_speed = 115200
upload_speed = 460800
; Label + ensure ESP-NN path is visible to app code (component already builds with -DESP_NN).
build_flags = -DESP_NN
monitor_filters = direct
